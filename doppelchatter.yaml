# doppelchatter.yaml — Main configuration
# All values shown are defaults. This file is optional — defaults work.

server:
  host: "127.0.0.1"
  port: 8420

llm:
  # API key loaded from DOPPEL_API_KEY env var (NEVER put it in this file)
  default_model: "anthropic/claude-sonnet-4-20250514"
  temperature: 0.88
  max_tokens: 512
  timeout_seconds: 120
  fallback_models:
    - "google/gemini-2.5-flash"
    - "openai/gpt-4o-mini"

engine:
  turn_delay:
    mode: "random"
    min_seconds: 1.5
    max_seconds: 4.0
  first_speaker: "twin_a"
  max_turns: 0
  max_context_messages: 50

twins:
  dir: "./twins"

scenarios:
  dir: "./scenarios"

storage:
  sessions_dir: "./sessions"

logging:
  level: "info"
